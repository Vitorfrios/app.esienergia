<!DOCTYPE html>
<html lang="pt-BR">
<!-- HTML Para o cliente -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obras | Sistema ESI</title>
    <link rel="icon" type="image/png" href="https://esienergia.com.br/wp-content/uploads/2024/02/favicon5.png">
    <link rel="stylesheet" href="/public/dist/obra-app.min.css?v=20260323-3">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        window.__APP_CONFIG_OVERRIDES__ = {
            mode: 'client',
            auth: {
                required: true,
                loginPage: '/login',
                redirectAfterLogin: '/obras/create'
            },
            features: {
                empresaAutocomplete: false,
                filtros: false,
                editDataNavigation: false,
                shutdown: false
            }
        };
    </script>
</head>

<body>
    <header class="header">
        <div class="header-left">
            <img src="https://esienergia.com.br/wp-content/uploads/2023/08/logo-esienergia-white.png"
                alt="Logo Esquerda" class="logo">
        </div>
        <div class="header-center">
            <h1 id="page-title">Criação de Obras</h1>
        </div>
        <button class="logout-btn" onclick="logoutClient()" title="Sair">
            Sair
        </button>
    </header>

    <nav class="navbar">
        <ul class="nav-list">
            <li><a href="/obras/create" id="nav-criar-obras">Criar Obras</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="container">
            <div class="add-obra-section">

                <div class="add-obra-actions">
                    <button class="btn btn-add add-obra-button" onclick="addNewObra()" id="add-obra-btn" type="button"
                        disabled>
                        + Adicionar Nova Obra
                    </button>
                </div>
            </div>

            <div id="projects-container"></div>
        </div>
    </main>

    <div id="confirmationModal" class="confirmation-modal hidden">
        <div class="modal-content">
            <div class="modal-icon">?</div>
            <h2 class="modal-title">Remover da Visualização</h2>
            <p class="modal-message" id="modalMessage"></p>
            <div class="modal-actions">
                <button class="modal-btn btn-cancel" onclick="window.closeConfirmationModal()">
                    Manter
                </button>
                <button class="modal-btn btn-confirm" onclick="window.confirmDeletion()">
                    Remover
                </button>
            </div>
        </div>
    </div>
    <footer>
        <a href="https://github.com/Vfrios" target="_blank" rel="noopener">
            <i class="fa-brands fa-github"></i> Vitor Rios on GitHub
        </a>
    </footer>
    <script defer src="/public/dist/create-obras-page.min.js?v=20260325-12"></script>
    <script defer src="/public/dist/obra-app.min.js?v=20260408-2"></script>
</body>

</html>
