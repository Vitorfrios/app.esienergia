<!DOCTYPE html>
<html lang="pt-BR">
<!-- HTML Para o ADM -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Obras | Sistema ESI</title>
    <link rel="icon" type="image/png" href="https://esienergia.com.br/wp-content/uploads/2024/02/favicon5.png">
    <link rel="stylesheet" href="/public/dist/obra-app.min.css?v=20260323-3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- HTML principal -->
    <script src="https://unpkg.com/docx@8.3.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>


</head>

<body>
    <header class="header">
        <div class="header-left">
            <img src="https://esienergia.com.br/wp-content/uploads/2023/08/logo-esienergia-white.png"
                alt="Logo Esquerda" class="logo">
        </div>
        <div class="header-center">
            <h1 id="page-title">Criação de Obras</h1>
        </div>
        <button class="shutdown-btn" onclick="shutdownManual()" title="Encerrar Servidor">
            Encerrar Servidor
        </button>
    </header>

    <nav class="navbar">
        <ul class="nav-list">
            <li><a href="/admin/obras/create" id="nav-criar-obras">Criar Obras</a></li>
            <li><a href="/admin/data" id="nav-editar-dados">Editar dados</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="container">
            <!-- Botão para adicionar nova obra -->
            <div class="add-obra-section">

                <!-- BLOCO ESQUERDO (switch + inputs divididos verticalmente) -->
                <div class="add-obra-filters filtro-bloco-altura">

                    <!-- METADE DE CIMA  SWITCH -->
                    <div class="filtro-switch-area">
                        <label class="filter-switch">
                            <input type="checkbox" id="filter-toggle" disabled>
                            <span class="slider"></span>
                        </label>

                        <span class="switch-label-text">Edição de Obras Salvas</span>

                    </div>

                    <!-- METADE DE BAIXO  INPUTS -->
                    <div class="filtro-inputs-area" id="filtros-inputs">
                        <input type="text" id="filter-empresa" placeholder="Empresa" disabled>

                        <input type="number" id="filter-numero-cliente" placeholder="NÂ Cliente" min="1" step="1"
                            disabled>

                        <input type="text" id="filter-nome-obra" placeholder="Nome da Obra" disabled>
                    </div>
                </div>

                <!-- BOTÃO NO MESMO NÍVEL -->
                <div class="add-obra-actions">
                    <button class="btn btn-add add-obra-button" onclick="addNewObra()" id="add-obra-btn" type="button"
                        disabled>
                        + Adicionar Nova Obra
                    </button>
                </div>

            </div>

            <!-- Container de Obras -->
            <div id="projects-container">
                <!-- Hierarquia: Obra  Projeto  Sala -->
            </div>
        </div>
    </main>

    <!-- Modal de Confirmação para Exclusão -->
    <div id="confirmationModal" class="confirmation-modal hidden">
        <div class="modal-content">
            <h2 class="modal-title">Remover da Visualização</h2>
            <p class="modal-message" id="modalMessage">
                <!-- O conteúdo será inserido pelo JavaScript -->
            </p>
            <div class="modal-actions">
                <button class="modal-btn btn-cancel" onclick="window.closeConfirmationModal()">
                    Manter
                </button>
                <button class="modal-btn btn-confirm" onclick="window.confirmDeletion()">
                    Remover
                </button>
            </div>
        </div>
    </div>
    <footer>
        <a href="https://github.com/Vfrios" target="_blank" rel="noopener">
            <i class="fa-brands fa-github"></i> Vitor Rios on GitHub
        </a>
    </footer>
    <script defer src="/public/dist/create-obras-page.min.js?v=20260325-12"></script>
    <script defer src="/public/dist/obra-app.min.js?v=20260408-2"></script>
</body>

</html>
